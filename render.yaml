services:
  - type: web
    name: crm-app
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn crm_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: crm-db
    plan: free