{% extends 'base.html' %}
{% block title %}Подтверждение удаления{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger animate__animated animate__fadeIn">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Подтверждение удаления</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="bi bi-trash text-danger" style="font-size: 5rem;"></i>
                </div>
                
                <h5 class="mb-3">Вы уверены, что хотите удалить?</h5>
                
                <div class="alert alert-warning">
                    <strong>{{ object }}</strong>
                </div>
                
                <p class="text-muted mb-4">
                    <i class="bi bi-info-circle"></i>
                    Это действие нельзя будет отменить.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-lg">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
